<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트 분전반 모니터링</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0f14;
  --bg2:       #13161e;
  --bg3:       #1a1e28;
  --border:    #252a38;
  --text:      #c8cdd8;
  --muted:     #5a6075;
  --accent:    #4fc3f7;
  --green:     #43e97b;
  --yellow:    #ffd740;
  --red:       #ff5252;
  --orange:    #ff9800;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
}

/* ── 헤더 ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-title { font-size: 15px; font-weight: 600; color: #fff; }
.header-sub { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.header-right { display: flex; align-items: center; gap: 16px; }
.updated-at { font-size: 11px; color: var(--muted); font-family: var(--mono); }
.status-badge {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--mono);
  letter-spacing: 0.05em;
}
.status-normal  { background: rgba(67,233,123,.15); color: var(--green); border: 1px solid rgba(67,233,123,.3); }
.status-warn    { background: rgba(255,215,64,.15);  color: var(--yellow); border: 1px solid rgba(255,215,64,.3); }
.status-danger  { background: rgba(255,82,82,.15);   color: var(--red);    border: 1px solid rgba(255,82,82,.3); }

/* ── 레이아웃 ── */
.container { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-9 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media(max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .grid-9 { grid-template-columns: repeat(2, 1fr); }
  header { flex-wrap: wrap; gap: 8px; }
}

/* ── 카드 ── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── 메인 게이지 ── */
.main-gauge-wrap {
  display: flex;
  align-items: center;
  gap: 24px;
}
.gauge-svg-wrap { position: relative; flex-shrink: 0; }
.gauge-label {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  top: 10px;
}
.gauge-kw {
  font-size: 28px;
  font-weight: 600;
  font-family: var(--mono);
  color: #fff;
  line-height: 1;
}
.gauge-pct {
  font-size: 13px;
  color: var(--muted);
  font-family: var(--mono);
  margin-top: 4px;
}
.gauge-stats { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; }
.stat-label { font-size: 12px; color: var(--muted); }
.stat-val { font-size: 13px; font-family: var(--mono); color: #fff; font-weight: 500; }

/* ── 날씨 ── */
.weather-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.weather-item { text-align: center; }
.weather-icon { font-size: 24px; margin-bottom: 4px; }
.weather-val { font-size: 18px; font-weight: 600; font-family: var(--mono); color: #fff; }
.weather-key { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── 회로 카드 ── */
.circuit-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  transition: border-color .2s;
}
.circuit-card.warn   { border-color: rgba(255,215,64,.4); }
.circuit-card.danger { border-color: rgba(255,82,82,.4); }
.circuit-id { font-size: 10px; font-family: var(--mono); color: var(--muted); margin-bottom: 2px; }
.circuit-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.circuit-bar-wrap {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 8px;
  overflow: hidden;
}
.circuit-bar {
  height: 100%;
  border-radius: 2px;
  transition: width .5s ease;
}
.bar-normal { background: var(--green); }
.bar-warn   { background: var(--yellow); }
.bar-danger { background: var(--red); }
.circuit-nums { display: flex; justify-content: space-between; }
.circuit-kw  { font-size: 13px; font-family: var(--mono); font-weight: 600; color: #fff; }
.circuit-pct { font-size: 11px; font-family: var(--mono); color: var(--muted); }

/* ── 시간별 그래프 ── */
.chart-wrap {
  height: 140px;
  display: flex;
  align-items: flex-end;
  gap: 3px;
  padding-top: 8px;
}
.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
  justify-content: flex-end;
}
.bar-col-inner {
  width: 100%;
  border-radius: 3px 3px 0 0;
  transition: height .4s ease;
  min-height: 2px;
}
.bar-col-label {
  font-size: 9px;
  font-family: var(--mono);
  color: var(--muted);
  white-space: nowrap;
}
.chart-ref-line {
  position: relative;
  margin-bottom: 0;
}

/* ── 사고 이력 ── */
.accident-table { width: 100%; border-collapse: collapse; }
.accident-table th {
  text-align: left;
  font-size: 10px;
  color: var(--muted);
  font-weight: 500;
  padding: 0 8px 8px 0;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.accident-table td {
  padding: 8px 8px 8px 0;
  font-size: 12px;
  border-bottom: 1px solid rgba(37,42,56,.6);
  vertical-align: middle;
}
.accident-table tr:last-child td { border-bottom: none; }
.acc-type {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 11px;
  font-family: var(--mono);
  background: rgba(255,152,0,.12);
  color: var(--orange);
}
.acc-sev-warn     { color: var(--yellow); }
.acc-sev-critical { color: var(--red); }

/* ── 낙뢰 ── */
.lightning-status {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.lightning-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.lightning-dot.active {
  background: var(--yellow);
  box-shadow: 0 0 8px rgba(255,215,64,.6);
  animation: pulse 1.2s ease infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .4; }
}
.lightning-label { font-size: 13px; font-weight: 500; color: #fff; }
.lightning-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.lgt-item { background: var(--bg3); border-radius: 6px; padding: 10px 12px; }
.lgt-key  { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .06em; }
.lgt-val  { font-size: 13px; font-family: var(--mono); color: #fff; font-weight: 500; }

/* ── AI 모델 ── */
.model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.model-item { background: var(--bg3); border-radius: 6px; padding: 10px 12px; }
.model-name { font-size: 10px; color: var(--muted); margin-bottom: 4px; font-family: var(--mono); }
.model-r2   { font-size: 15px; font-family: var(--mono); font-weight: 600; color: #fff; }
.model-mae  { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.r2-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.r2-bar { height: 100%; border-radius: 2px; background: var(--accent); }

/* ── 섹션 간격 ── */
.section { margin-bottom: 16px; }
.section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── 로딩 ── */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  gap: 16px;
  color: var(--muted);
}
.loading-spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.no-data { color: var(--muted); font-size: 12px; text-align: center; padding: 20px 0; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-logo">⚡</div>
    <div>
      <div class="header-title">스마트 분전반</div>
      <div class="header-sub">100A / 22kW / 사무실 9회로 · 홍성</div>
    </div>
  </div>
  <div class="header-right">
    <div class="updated-at" id="updated-at">—</div>
    <div class="status-badge status-normal" id="status-badge">NORMAL</div>
  </div>
</header>

<div id="loading" class="loading">
  <div class="loading-spinner"></div>
  <div>데이터 로딩 중...</div>
</div>

<div id="main" style="display:none">
<div class="container">

  <!-- 1행: 메인 게이지 + 날씨 + 낙뢰 -->
  <div class="section">
    <div class="grid-3">

      <!-- 총 부하 게이지 -->
      <div class="card">
        <div class="card-title">⚡ 총 부하</div>
        <div class="main-gauge-wrap">
          <div class="gauge-svg-wrap">
            <svg width="130" height="130" viewBox="0 0 130 130">
              <circle cx="65" cy="65" r="52" fill="none" stroke="#1a1e28" stroke-width="10"/>
              <circle cx="65" cy="65" r="52" fill="none" stroke="#252a38" stroke-width="10"
                stroke-dasharray="326.7" stroke-dashoffset="0" stroke-linecap="round"
                transform="rotate(-90 65 65)"/>
              <!-- warn 기준선 -->
              <circle cx="65" cy="65" r="52" fill="none" stroke="rgba(255,215,64,.4)" stroke-width="2"
                stroke-dasharray="2 324.7" stroke-dashoffset="-228.7"
                transform="rotate(-90 65 65)"/>
              <!-- 실제 부하 바 -->
              <circle id="gauge-bar" cx="65" cy="65" r="52" fill="none" stroke="#43e97b" stroke-width="10"
                stroke-dasharray="0 326.7" stroke-dashoffset="0" stroke-linecap="round"
                transform="rotate(-90 65 65)" style="transition: stroke-dasharray .6s ease, stroke .3s"/>
            </svg>
            <div class="gauge-label">
              <div class="gauge-kw" id="gauge-kw">—</div>
              <div class="gauge-pct" id="gauge-pct">—%</div>
            </div>
          </div>
          <div class="gauge-stats">
            <div class="stat-row">
              <span class="stat-label">전류</span>
              <span class="stat-val" id="stat-current">—</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">경고 기준</span>
              <span class="stat-val" style="color:var(--yellow)">15.4 kW</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">위험 기준</span>
              <span class="stat-val" style="color:var(--red)">19.8 kW</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">용량</span>
              <span class="stat-val">22.0 kW</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 날씨 -->
      <div class="card">
        <div class="card-title">🌤 현재 날씨</div>
        <div class="weather-grid">
          <div class="weather-item">
            <div class="weather-icon" id="w-icon">—</div>
            <div class="weather-val" id="w-temp">—</div>
            <div class="weather-key">기온 (°C)</div>
          </div>
          <div class="weather-item">
            <div class="weather-icon">💧</div>
            <div class="weather-val" id="w-hum">—</div>
            <div class="weather-key">습도 (%)</div>
          </div>
          <div class="weather-item">
            <div class="weather-icon" id="w-thunder-icon">—</div>
            <div class="weather-val" id="w-thunder">—</div>
            <div class="weather-key">낙뢰</div>
          </div>
        </div>
      </div>

      <!-- 낙뢰 현황 -->
      <div class="card">
        <div class="card-title">⚡ 낙뢰 현황</div>
        <div class="lightning-status">
          <div class="lightning-dot" id="lgt-dot"></div>
          <div class="lightning-label" id="lgt-label">감지 없음</div>
        </div>
        <div class="lightning-grid" id="lgt-grid">
          <div class="lgt-item">
            <div class="lgt-key">감지 건수</div>
            <div class="lgt-val" id="lgt-count">0건</div>
          </div>
          <div class="lgt-item">
            <div class="lgt-key">위험도</div>
            <div class="lgt-val" id="lgt-level">없음</div>
          </div>
          <div class="lgt-item" id="lgt-dist-wrap">
            <div class="lgt-key">분전반까지</div>
            <div class="lgt-val" id="lgt-dist">—</div>
          </div>
          <div class="lgt-item" id="lgt-type-wrap">
            <div class="lgt-key">낙뢰 종류</div>
            <div class="lgt-val" id="lgt-type">—</div>
          </div>
          <div class="lgt-item" id="lgt-amp-wrap" style="grid-column: span 2">
            <div class="lgt-key">위치 / 강도</div>
            <div class="lgt-val" id="lgt-addr">—</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 2행: 9개 회로 -->
  <div class="section">
    <div class="section-title">회로별 현황</div>
    <div class="grid-9" id="circuits-grid"></div>
  </div>

  <!-- 3행: 시간별 그래프 + 사고 이력 -->
  <div class="section">
    <div class="grid-2">

      <!-- 시간별 부하 -->
      <div class="card">
        <div class="card-title">📊 오늘 시간별 부하</div>
        <div class="chart-wrap" id="hourly-chart"></div>
        <div style="display:flex; justify-content:space-between; margin-top:8px;">
          <span style="font-size:10px; color:var(--muted)">00시</span>
          <span style="font-size:10px; color:var(--muted)">12시</span>
          <span style="font-size:10px; color:var(--muted)">23시</span>
        </div>
      </div>

      <!-- 사고 이력 -->
      <div class="card">
        <div class="card-title">🚨 사고 이력 (최근 10건)</div>
        <div style="overflow-x:auto">
          <table class="accident-table">
            <thead>
              <tr>
                <th>시각</th>
                <th>사고 유형</th>
                <th>심각도</th>
                <th>회로</th>
              </tr>
            </thead>
            <tbody id="accident-tbody">
              <tr><td colspan="4" class="no-data">데이터 없음</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- 4행: AI 모델 성능 -->
  <div class="section">
    <div class="section-title">AI 모델 성능</div>
    <div class="card">
      <div class="model-grid" id="model-grid"></div>
    </div>
  </div>

</div><!-- /container -->
</div><!-- /main -->

<script>
const DATA_URL = 'https://raw.githubusercontent.com/wnstjq813-web/smart-panel/main/dashboard_data.json';

const WEATHER_ICON = {
  clear: '☀️', partly_cloudy: '⛅', cloudy: '☁️',
  rainy: '🌧', snowy: '❄️', shower: '🌦', sleet: '🌨', none: '—'
};

const ACC_TYPE_KO = {
  overcurrent: '과전류', earth_fault: '지락',
  voltage_abnormality: '전압이상', motor_lock: '모터구속',
  lightning_surge: '낙뢰서지', overvoltage: '과전압',
  insulation_degradation: '절연열화', contact_failure: '접촉불량',
  harmonic_distortion: '고조파', low_power_factor: '저역률',
  phase_unbalance: '불평형', capacitor_failure: '커패시터이상',
  aging_failure: '노화', arc_fault: '아크', motor_starting: '기동전류',
  none: '없음'
};

function statusColor(s) {
  return s === 'danger' ? 'var(--red)' : s === 'warn' ? 'var(--yellow)' : 'var(--green)';
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    return await res.json();
  } catch(e) {
    console.error(e);
    return null;
  }
}

function render(d) {
  // 헤더
  const s = d.current.status;
  document.getElementById('updated-at').textContent =
    '업데이트: ' + d.updated_at.replace('T', ' ').slice(0, 16);
  const badge = document.getElementById('status-badge');
  badge.textContent = s === 'danger' ? '위험' : s === 'warn' ? '경고' : '정상';
  badge.className = 'status-badge status-' + s;

  // 게이지
  const kw   = d.current.total_load_kw;
  const pct  = d.current.load_ratio;
  const maxC = 326.7;
  const fill = Math.min(pct, 1) * maxC;
  const bar  = document.getElementById('gauge-bar');
  bar.style.strokeDasharray = fill + ' ' + (maxC - fill);
  bar.style.stroke = statusColor(s);
  document.getElementById('gauge-kw').textContent     = kw.toFixed(2) + ' kW';
  document.getElementById('gauge-pct').textContent    = (pct * 100).toFixed(1) + '%';
  document.getElementById('stat-current').textContent = d.current.total_current_a.toFixed(1) + ' A';

  // 날씨
  const w = d.weather;
  document.getElementById('w-icon').textContent    = WEATHER_ICON[w.weather_code] || '—';
  document.getElementById('w-temp').textContent    = w.temperature;
  document.getElementById('w-hum').textContent     = w.humidity;
  document.getElementById('w-thunder-icon').textContent = w.is_thunder ? '⚡' : '✅';
  document.getElementById('w-thunder').textContent      = w.is_thunder ? '감지' : '없음';

  // 낙뢰
  const lgt = d.lightning;
  const dot = document.getElementById('lgt-dot');
  if (lgt.detected) {
    dot.classList.add('active');
    document.getElementById('lgt-label').textContent =
      lgt.danger_level === 'danger' ? '⚠️ 위험 — 즉시 확인' :
      lgt.danger_level === 'warning' ? '🟡 주의 — 모니터링 중' : '🔵 원거리 감지';
  } else {
    dot.classList.remove('active');
    document.getElementById('lgt-label').textContent = '감지 없음';
  }
  document.getElementById('lgt-count').textContent = (lgt.count_10min || 0) + '건';
  const levelKo = { none: '없음', watch: '관찰', warning: '주의', danger: '위험' };
  document.getElementById('lgt-level').textContent = levelKo[lgt.danger_level] || '없음';
  document.getElementById('lgt-dist').textContent  = lgt.closest_dist_km ? lgt.closest_dist_km + ' km' : '—';
  const typeKo = { CG: '구름-지면 (CG)', CC: '구름-구름 (CC)' };
  document.getElementById('lgt-type').textContent  = typeKo[lgt.closest_type] || '—';
  let addrStr = lgt.closest_address || '—';
  if (lgt.closest_amp_ka) addrStr += ' / ' + (lgt.closest_amp_ka > 0 ? '+' : '') + lgt.closest_amp_ka + ' kA';
  document.getElementById('lgt-addr').textContent  = addrStr;

  // 회로
  const cg = document.getElementById('circuits-grid');
  cg.innerHTML = '';
  Object.entries(d.circuits).forEach(([id, c]) => {
    const pctBar = Math.min(c.load_rate * 100, 100);
    const cs = c.status || 'normal';
    const barClass = cs === 'danger' ? 'bar-danger' : cs === 'warn' ? 'bar-warn' : 'bar-normal';
    cg.innerHTML += `
      <div class="circuit-card ${cs}">
        <div class="circuit-id">${id.toUpperCase()}</div>
        <div class="circuit-name">${c.name}</div>
        <div class="circuit-bar-wrap">
          <div class="circuit-bar ${barClass}" style="width:${pctBar}%"></div>
        </div>
        <div class="circuit-nums">
          <span class="circuit-kw">${c.load_kw.toFixed(2)} kW</span>
          <span class="circuit-pct">${(c.load_rate*100).toFixed(0)}%</span>
        </div>
      </div>`;
  });

  // 시간별 그래프
  const hc   = document.getElementById('hourly-chart');
  hc.innerHTML = '';
  if (d.hourly && d.hourly.length) {
    const maxKw = Math.max(...d.hourly.map(h => h.total_load_kw), 0.1);
    d.hourly.forEach(h => {
      const ht  = Math.round((h.total_load_kw / maxKw) * 120);
      const bc  = h.status === 'danger' ? 'var(--red)' :
                  h.status === 'warn'   ? 'var(--yellow)' : 'var(--accent)';
      const op  = h.accident && h.accident !== 'none' ? '1' : '0.5';
      hc.innerHTML += `
        <div class="bar-col" title="${h.hour}시 ${h.total_load_kw}kW">
          <div class="bar-col-inner" style="height:${ht}px;background:${bc};opacity:${op}"></div>
          <div class="bar-col-label">${h.hour}</div>
        </div>`;
    });
  } else {
    hc.innerHTML = '<div class="no-data">데이터 없음</div>';
  }

  // 사고 이력
  const tb = document.getElementById('accident-tbody');
  const log = (d.accident_log || []).slice(-10).reverse();
  if (log.length === 0) {
    tb.innerHTML = '<tr><td colspan="4" class="no-data">사고 이력 없음</td></tr>';
  } else {
    tb.innerHTML = log.map(a => {
      const dt  = a.datetime.replace('T', ' ').slice(0, 16);
      const sev = a.severity === 'critical' ? '<span class="acc-sev-critical">위험</span>' :
                  a.severity === 'warn'     ? '<span class="acc-sev-warn">경고</span>' : a.severity;
      return `<tr>
        <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${dt}</td>
        <td><span class="acc-type">${ACC_TYPE_KO[a.type] || a.type}</span></td>
        <td>${sev}</td>
        <td style="font-family:var(--mono);color:var(--accent)">${a.circuit}</td>
      </tr>`;
    }).join('');
  }

  // AI 모델 성능
  const mg = document.getElementById('model-grid');
  mg.innerHTML = '';
  const nameMap = {
    total_load_kw: '총 부하', c1_kw: 'c1 조명A', c2_kw: 'c2 조명B',
    c3_kw: 'c3 콘센트A', c4_kw: 'c4 콘센트B', c5_kw: 'c5 냉난방기',
    c6_kw: 'c6 서버', c7_kw: 'c7 복합기', c8_kw: 'c8 환기팬', c9_kw: 'c9 예비'
  };
  Object.entries(d.model_metrics || {}).forEach(([k, v]) => {
    const r2   = Math.max(0, v.r2);
    const r2w  = Math.round(r2 * 100);
    const col  = r2 >= 0.8 ? 'var(--green)' : r2 >= 0.6 ? 'var(--yellow)' : 'var(--red)';
    mg.innerHTML += `
      <div class="model-item">
        <div class="model-name">${nameMap[k] || k}</div>
        <div class="model-r2" style="color:${col}">R² ${v.r2.toFixed(4)}</div>
        <div class="model-mae">MAE ${v.mae.toFixed(4)} kW</div>
        <div class="r2-bar-wrap"><div class="r2-bar" style="width:${r2w}%;background:${col}"></div></div>
      </div>`;
  });
}

async function init() {
  const d = await loadData();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display    = 'block';
  if (d) render(d);
  else document.getElementById('main').innerHTML = '<div class="no-data" style="padding:40px">데이터를 불러올 수 없습니다.</div>';
}

init();
setInterval(async () => {
  const d = await loadData();
  if (d) render(d);
}, 60000);
</script>
</body>
</html>
